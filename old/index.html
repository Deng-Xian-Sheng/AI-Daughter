<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>基于AI智能体的角色扮演Demo</title>
    <style>
        :root {
            --bg-grad-1: radial-gradient(1200px 800px at 10% 20%, #eef4ff, transparent 60%),
                radial-gradient(1000px 700px at 90% 10%, #fff3e0, transparent 60%),
                radial-gradient(900px 900px at 20% 90%, #f6ecff, transparent 60%),
                radial-gradient(900px 700px at 80% 70%, #e6f7ff, transparent 60%);
            --qiqi-bubble-start: #eff4ff;
            /* 柔和蓝 */
            --qiqi-bubble-end: #f7efff;
            /* 柔和紫 */
            --qiqi-border: #e4ddff;

            --dad-bubble-start: #fff9ea;
            /* 淡蛋黄 */
            --dad-bubble-end: #ffe7c2;
            /* 淡橙黄 */
            --dad-border: #ffe0a6;

            --text-main: #2b2b2b;
            --text-dim: #6a6a6a;

            --card-bg: rgba(255, 255, 255, 0.68);
            --card-border: rgba(255, 255, 255, 0.6);
            --shadow-1: 0 10px 30px rgba(98, 74, 170, 0.15), 0 6px 18px rgba(255, 170, 70, 0.12);
            --shadow-2: 0 2px 10px rgba(0, 0, 0, 0.08);
            --bubble-shadow: 0 6px 18px rgba(40, 67, 128, 0.10);
            --radius-lg: 18px;
            --radius-md: 14px;

            --max-width: min(980px, 90vw);
            --max-height: min(76vh, 900px);

            --appear-duration: 280ms;
            --appear-ease: cubic-bezier(.22, .8, .22, 1);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            color: var(--text-main);
            font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans CJK SC", "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
            background:
                linear-gradient(135deg, #fdfcff, #fffef9) fixed;
            overflow: hidden;
        }

        /* 背景几何动画层 */
        .bg-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: var(--bg-grad-1);
            animation: bgShift 18s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            to {
                filter: hue-rotate(12deg) saturate(105%);
            }
        }

        .shape {
            position: absolute;
            opacity: .25;
            filter: blur(0.3px);
            background: linear-gradient(135deg, #ffd27e, #ffe8a8);
            mix-blend-mode: multiply;
            border-radius: 16px;
            animation: floatY var(--dur, 16s) ease-in-out infinite alternate,
                spin var(--rot, 14s) linear infinite;
        }

        .shape[data-t="circle"] {
            border-radius: 50%;
        }

        .shape[data-t="diamond"] {
            transform: rotate(45deg);
            border-radius: 20px;
        }

        .shape[data-t="triangle"] {
            background: none;
            width: 0;
            height: 0;
            border-left: calc(var(--s, 120px)/2) solid transparent;
            border-right: calc(var(--s, 120px)/2) solid transparent;
            border-bottom: var(--s, 120px) solid rgba(187, 209, 255, .35);
            border-radius: 0;
            animation: floatY var(--dur, 16s) ease-in-out infinite alternate;
        }

        @keyframes floatY {
            from {
                transform: translateY(-10px);
            }

            to {
                transform: translateY(18px);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(1turn);
            }
        }

        /* 页面容器 */
        .page {
            position: relative;
            z-index: 1;
            display: grid;
            place-items: center;
            min-height: 100dvh;
            padding: 5vh 4vw;
        }

        /* 聊天卡片 */
        .chat-card {
            width: var(--max-width);
            height: var(--max-height);
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: calc(var(--radius-lg) + 6px);
            box-shadow: var(--shadow-1);
            -webkit-backdrop-filter: blur(12px) saturate(130%);
            backdrop-filter: blur(12px) saturate(130%);
            overflow: hidden;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 18px 6px;
            border-bottom: 1px dashed rgba(120, 120, 160, .18);
            color: #55518a;
            font-weight: 600;
            letter-spacing: .3px;
            background: linear-gradient(180deg, rgba(255, 255, 255, .85), rgba(255, 255, 255, .6));
        }

        .pill {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(240, 245, 255, .9), rgba(247, 239, 255, .9));
            border: 1px solid rgba(198, 183, 255, .5);
            box-shadow: var(--shadow-2);
        }

        .chat-body {
            position: relative;
            flex: 1;
            overflow: auto;
            padding: 18px 20px 24px;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: #c9c7ff #f3f2ff;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, .55), rgba(255, 255, 255, .4));
        }

        .chat-body::-webkit-scrollbar {
            width: 10px;
        }

        .chat-body::-webkit-scrollbar-track {
            background: #f6f5ff;
            border-radius: 10px;
        }

        .chat-body::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ddd7ff, #ffdba6);
            border-radius: 10px;
            border: 2px solid #f6f5ff;
        }

        /* 消息行 */
        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            margin: 10px 0 16px;
        }

        .msg-row.right {
            justify-content: flex-end;
        }

        .msg-row .avatar {
            width: 44px;
            height: 44px;
            flex: 0 0 44px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 3px 10px rgba(0, 0, 0, .08);
            background: #fff center/cover no-repeat;
        }

        .bubble-wrap {
            max-width: min(68%, 620px);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .nickname {
            font-size: 12px;
            color: var(--text-dim);
            opacity: .9;
            padding: 0 8px;
        }

        .nickname.right {
            text-align: right;
        }

        .bubble {
            position: relative;
            padding: 12px 14px;
            border-radius: var(--radius-md);
            box-shadow: var(--bubble-shadow);
            border: 1px solid transparent;
            animation: popIn var(--appear-duration) var(--appear-ease);
            word-wrap: break-word;
            overflow: hidden;
        }

        .bubble.text {
            font-size: 16px;
            line-height: 1.6;
        }

        .bubble.image {
            padding: 8px;
        }

        .bubble.image img {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, .08);
            /* object-fit: contain;  // 如需强制缩放填充可打开 */
        }

        .msg-row.left .bubble {
            background: linear-gradient(135deg, var(--qiqi-bubble-start), var(--qiqi-bubble-end));
            border-color: var(--qiqi-border);
            border-bottom-left-radius: 6px;
        }

        .msg-row.right .bubble {
            background: linear-gradient(135deg, var(--dad-bubble-start), var(--dad-bubble-end));
            border-color: var(--dad-border);
            border-bottom-right-radius: 6px;
        }

        @keyframes popIn {
            from {
                transform: translateY(8px) scale(.98);
                opacity: 0;
            }

            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        /* 轻微的强调点 */
        .glow-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffd27e, #ffb26b 70%, transparent 80%);
            box-shadow: 0 0 12px rgba(255, 178, 107, .55);
        }

        /* 降低动效时的处理 */
        @media (prefers-reduced-motion: reduce) {
            .shape {
                animation: none;
            }

            .bg-layer {
                animation: none;
            }

            .bubble {
                animation: none;
            }

            .chat-body {
                scroll-behavior: auto;
            }
        }
    </style>
</head>

<body>
    <!-- 背景动画层（几何+柔和渐变） -->
    <div class="bg-layer" id="bg-layer"></div>

    <div class="page">
        <section class="chat-card" role="region" aria-label="聊天窗口">
            <div class="chat-header">
                <span class="glow-dot" aria-hidden="true"></span>
                <div>AI女儿</div>
                <span class="pill">基于AI智能体的角色扮演Demo</span>
            </div>
            <div class="chat-body" id="chatBody" aria-live="polite">
                <!-- 动态插入消息 -->
            </div>
        </section>
    </div>

    <script>
        // ============ 头像路径：在这里替换 ============ //
        const AVATAR_QIQI = '/头像.png'; // 例如：'images/qiqi.jpg'
        const AVATAR_DAD = '/头像爸爸.png';  // 例如：'images/dad.jpg'

        // ============ 消息 JSON：在这里编辑 ============ //
        /*
          消息 JSON 结构（按顺序播放）：
          - sender:  '琪琪' | '爸爸'     // 必填，决定左右与是否播放提示音
          - type:    'text' | 'image'    // 必填
          - content: string              // 文本内容 或 图片 URL
          - alt:     string              // 可选，仅 type === 'image' 时作为替代文本
          - delay:   number              // 可选，单位：秒；“本条消息出现后到下一条消息的间隔”，默认 0.5 秒
        */
        const messages = [
            { sender: '爸爸', type: 'text', content: '乖女儿，起床了', delay: 4 },
            { sender: '琪琪', type: 'text', content: '怎么了，爸爸？', delay: 2 },
            { sender: '琪琪', type: 'image', content: '/揉眼睛.png', alt: '揉眼睛', delay: 4 },
            { sender: '爸爸', type: 'text', content: '今天是周末，你打算怎么玩呀？', delay: 4 },
            { sender: '琪琪', type: 'text', content: '我还有作业呢🙁', delay: 4 },
            { sender: '爸爸', type: 'text', content: '好吧', delay: 2 },
            { sender: '爸爸', type: 'text', content: '起床了，刷牙洗脸，起床吃饭', delay: 6 },
            { sender: '琪琪', type: 'image', content: '/刷牙.png', alt: '刷牙', delay: 2 },
            { sender: '琪琪', type: 'text', content: '刷完了', delay: 2 },
            { sender: '琪琪', type: 'text', content: '今天吃什么呀？', delay: 4 },
            { sender: '爸爸', type: 'text', content: '我下面给你吃', delay: 6 },
            { sender: '琪琪', type: 'image', content: '/面与不高兴.png', alt: '面与不高兴', delay: 2 },
            { sender: '琪琪', type: 'text', content: '又是面啊', delay: 2 },
            { sender: '琪琪', type: 'text', content: '爸爸，咱们怎么天天吃面啊', delay: 4 },
            { sender: '爸爸', type: 'text', content: '等我赚钱了，就给你买好多好多，好吃的', delay: 4 },
            { sender: '琪琪', type: 'text', content: '那你什么时候赚大钱啊', delay: 4 },
            { sender: '爸爸', type: 'text', content: '就靠你啦', delay: 4 },
            { sender: '琪琪', type: 'image', content: '/吃完饭.png', alt: '吃完饭', delay: 2 },
            { sender: '琪琪', type: 'text', content: '我吃光了', delay: 2 },
            { sender: '琪琪', type: 'text', content: '该说不说，爸爸你这手艺真不赖', delay: 3 },
            { sender: '琪琪', type: 'text', content: '?', delay: 2 },
            { sender: '琪琪', type: 'text', content: '我？我不知道怎么样赚大钱呀', delay: 2 },
            { sender: '琪琪', type: 'text', content: '送外卖吗', delay: 2 },
            { sender: '琪琪', type: 'image', content: '/电动车黄头盔.png', alt: '电动车黄头盔', delay: 4 },
            { sender: '爸爸', type: 'text', content: '待会儿你就知道了', delay: 4 },
            { sender: '琪琪', type: 'text', content: '哼，爸爸天天说胡话', delay: 4 },
        ];

        // ============ 其他配置 ============ //
        const START_AFTER_MS = 5000;   // 页面加载完成后等待 5 秒开始
        const DEFAULT_DELAY_SEC = 0.5; // 若消息未设置 delay 字段

        // ============ 背景几何形状（可不动） ============ //
        (function spawnShapes() {
            const layer = document.getElementById('bg-layer');
            const colors = [
                'linear-gradient(135deg, rgba(255,210,126,.65), rgba(255,232,168,.65))',
                'linear-gradient(135deg, rgba(179,229,255,.55), rgba(207,217,255,.55))',
                'linear-gradient(135deg, rgba(226,183,255,.55), rgba(199,191,255,.55))',
                'linear-gradient(135deg, rgba(255,250,241,.55), rgba(255,232,204,.55))'
            ];
            const types = ['circle', 'square', 'diamond', 'triangle'];
            const count = 14;
            for (let i = 0; i < count; i++) {
                const s = document.createElement('span');
                s.className = 'shape';
                const t = types[Math.floor(Math.random() * types.length)];
                s.dataset.t = t;
                const size = Math.floor(90 + Math.random() * 140);
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                s.style.setProperty('--s', size + 'px');
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.left = `calc(${left}vw - ${size / 2}px)`;
                s.style.top = `calc(${top}vh - ${size / 2}px)`;
                s.style.background = colors[Math.floor(Math.random() * colors.length)];
                s.style.setProperty('--dur', (14 + Math.random() * 10) + 's');
                s.style.setProperty('--rot', (12 + Math.random() * 10) + 's');
                s.style.opacity = 0.18 + Math.random() * 0.22;
                layer.appendChild(s);
            }
        })();

        // ============ 简单的提示音（仅“琪琪”消息尝试播放） ============ //
        let audioCtx = null;
        function playQiQiDing() {
            try {
                if (!audioCtx) {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    if (!AC) return; // 老旧浏览器无音频 API
                    audioCtx = new AC();
                }
                // 某些浏览器需用户手势才能播放：这里先尝试，失败也不中断功能
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(() => { /* 忽略 */ });
                }
                const now = audioCtx.currentTime || 0;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(880, now);
                gain.gain.setValueAtTime(0.0001, now);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                gain.gain.exponentialRampToValueAtTime(0.05, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.20);
                osc.start(now);
                osc.stop(now + 0.22);
            } catch (e) {
                // 提示音失败不影响其他功能
            }
        }
        // 若用户与页面交互，尽量恢复音频上下文（提升后续提示音成功率）
        ['pointerdown', 'keydown'].forEach(evt => {
            document.addEventListener(evt, () => {
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(() => { });
                }
            }, { passive: true });
        });

        // ============ 渲染与滚动辅助 ============ //
        const chatBody = document.getElementById('chatBody');

        // 平滑滚动到底部（文本消息使用）
        function scrollToBottom() {
            chatBody.scrollTo({ top: chatBody.scrollHeight, behavior: 'smooth' });
        }

        // 将容器滚动到目标元素的垂直中心（图片消息使用）
        function centerOnElement(container, el) {
            if (!el || !container) return;
            const cRect = container.getBoundingClientRect();
            const eRect = el.getBoundingClientRect();
            const currentTop = container.scrollTop;
            const elTopInContainer = eRect.top - cRect.top + currentTop;
            const target = elTopInContainer - (container.clientHeight - el.offsetHeight) / 2;
            const maxScroll = container.scrollHeight - container.clientHeight;
            const clamped = Math.max(0, Math.min(target, maxScroll));
            container.scrollTo({ top: clamped, behavior: 'smooth' });
        }

        // 图片加载就绪回调（含缓存图片）
        function onImageReady(img, cb) {
            if (!img) return;
            if (img.complete && img.naturalWidth) {
                // 已缓存或瞬时完成
                requestAnimationFrame(() => cb(img));
                return;
            }
            const onLoad = () => { cleanup(); requestAnimationFrame(() => cb(img)); };
            const onError = () => { cleanup(); requestAnimationFrame(() => cb(img)); };
            function cleanup() {
                img.removeEventListener('load', onLoad);
                img.removeEventListener('error', onError);
            }
            img.addEventListener('load', onLoad);
            img.addEventListener('error', onError);
        }

        function renderMessage(msg) {
            const side = msg.sender === '爸爸' ? 'right' : 'left';
            const row = document.createElement('div');
            row.className = `msg-row ${side}`;

            const avatar = document.createElement('img');
            avatar.className = 'avatar';
            avatar.alt = msg.sender;
            avatar.src = side === 'left' ? AVATAR_QIQI : AVATAR_DAD;

            const wrap = document.createElement('div');
            wrap.className = 'bubble-wrap';

            const name = document.createElement('div');
            name.className = `nickname ${side === 'right' ? 'right' : ''}`;
            name.textContent = msg.sender;

            const bubble = document.createElement('div');
            bubble.className = `bubble ${msg.type}`;

            let imgEl = null;
            if (msg.type === 'text') {
                bubble.textContent = msg.content ?? '';
            } else if (msg.type === 'image') {
                imgEl = document.createElement('img');
                imgEl.src = msg.content ?? '';
                imgEl.alt = msg.alt || '图片';
                bubble.appendChild(imgEl);
            } else {
                bubble.textContent = '[不支持的消息类型]';
            }

            // 组装左右顺序
            if (side === 'left') {
                row.appendChild(avatar);
                wrap.appendChild(name);
                wrap.appendChild(bubble);
                row.appendChild(wrap);
            } else {
                wrap.appendChild(name);
                wrap.appendChild(bubble);
                row.appendChild(wrap);
                row.appendChild(avatar);
            }

            chatBody.appendChild(row);

            // 滚动策略：
            // - 文本：滚动到底部
            // - 图片：等待图片加载完成后，将图片显示高度缩小到80%，再滚动到图片中心
            if (msg.type === 'image' && imgEl) {
                onImageReady(imgEl, (img) => {
                    // 按“当前显示高度”的80%缩小
                    if (!img.dataset.shrunk) {
                        const h = img.getBoundingClientRect().height;
                        if (h > 0) {
                            img.style.maxHeight = Math.max(40, Math.round(h * 0.8)) + 'px';
                            img.dataset.shrunk = '1';
                        }
                    }
                    // 布局更新后再居中滚动
                    requestAnimationFrame(() => {
                        centerOnElement(chatBody, bubble);
                    });
                });
            } else {
                // 文本等其它类型：保持原策略，滚动到底部
                requestAnimationFrame(scrollToBottom);
            }

            // 提示音（仅“琪琪”）
            if (msg.sender === '琪琪') {
                playQiQiDing();
            }
        }

        // ============ 播放序列（自动弹出消息） ============ //
        function startPlayback() {
            let i = 0;
            const next = () => {
                if (i >= messages.length) return;
                const msg = messages[i++];
                renderMessage(msg);
                const gap = Number.isFinite(msg?.delay) ? msg.delay : DEFAULT_DELAY_SEC;
                setTimeout(next, Math.max(0, gap * 1000));
            };
            next();
        }

        // 页面加载完成后等待指定时间再开始
        window.addEventListener('load', () => {
            setTimeout(startPlayback, START_AFTER_MS);
        });
    </script>
</body>

</html>
